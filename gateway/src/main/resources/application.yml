server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    consul:
      host: consul
      port: 8500
      discovery:
        register: true

    gateway:

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: false

      routes:

        # Auth Service
        - id: auth-service-route
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        # Booking Service
        - id: booking-service-route
          uri: http://booking-service:8082
          predicates:
            - Path=/booking/**
          filters:
            - StripPrefix=1

        # Match Service
        - id: match-service-route
          uri: http://match-service:8083
          predicates:
            - Path=/match/**
          filters:
            - StripPrefix=1

        # Equipment Service
        - id: equipment-service-route
          uri: http://equipment-service:8084
          predicates:
            - Path=/equipment/**
          filters:
            - StripPrefix=1

        # Notification Service
        - id: notification-service-route
          uri: http://notification-service:8085
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

        # Payment Service
        - id: payment-service-route
          uri: http://payment-service:8086
          predicates:
            - Path=/payment/**
          filters:
            - StripPrefix=1