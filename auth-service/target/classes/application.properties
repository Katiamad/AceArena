server.port=8081
spring.application.name=auth-service

spring.datasource.url=jdbc:postgresql://postgres:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.cloud.consul.host=consul
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.register=true

security.jwt.key.private=classpath:rsaKey.private
security.jwt.key.public=classpath:rsaKey.public
security.jwt.issuer=self
security.jwt.expiration-minutes=240